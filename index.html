<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きっかけ確認システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
<main style="max-width:400px; margin:4rem auto; padding:0 1rem;">
  <h1 style="text-align:center; margin-bottom:8px;">きっかけ確認システム</h1>
  <p style="text-align:center; color:#888; font-size:13px; margin-bottom:32px;">お笑いサークル ライブ運営ツール</p>

  <div class="card">
    <div style="display:flex; gap:0; margin-bottom:24px; border-bottom:1px solid #eee;">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">新規登録</button>
    </div>

    <!-- ログイン -->
    <div id="login-form">
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" placeholder="example@email.com">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="login-password" placeholder="パスワード">
      </div>
      <p id="login-error" style="color:#dc3545; font-size:13px; margin-bottom:12px; display:none;"></p>
      <button onclick="handleLogin()" class="btn-primary" style="width:100%;">ログイン</button>
    </div>

    <!-- 新規登録 -->
    <div id="register-form" style="display:none;">
      <div class="field">
        <label>表示名</label>
        <input type="text" id="reg-name" placeholder="例: 山田太郎">
      </div>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="reg-email" placeholder="example@email.com">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="reg-password" placeholder="6文字以上">
      </div>
      <div class="field">
        <label>アカウント種別 <span class="req">*</span></label>
        <div class="btn-group">
          <button class="tog-btn" id="role-performer" onclick="setRole('performer')">演者</button>
          <button class="tog-btn" id="role-staff" onclick="setRole('staff')">スタッフ</button>
        </div>
      </div>
      <p id="reg-error" style="color:#dc3545; font-size:13px; margin-bottom:12px; display:none;"></p>
      <p id="reg-success" style="color:#198754; font-size:13px; margin-bottom:12px; display:none;"></p>
      <button onclick="handleRegister()" class="btn-primary" style="width:100%;">登録する</button>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL'
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let selectedRole = ''

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (session) redirectByRole(session.user)
}

async function redirectByRole(user) {
  const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single()
  if (!profile) return
  if (profile.role === 'staff') location.href = 'staff.html'
  else location.href = 'form.html'
}

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none'
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none'
  document.getElementById('tab-login').classList.toggle('active', tab === 'login')
  document.getElementById('tab-register').classList.toggle('active', tab === 'register')
}

function setRole(role) {
  selectedRole = role
  document.getElementById('role-performer').classList.toggle('active-info', role === 'performer')
  document.getElementById('role-staff').classList.toggle('active-info', role === 'staff')
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  const errEl = document.getElementById('login-error')
  errEl.style.display = 'none'
  const { data, error } = await sb.auth.signInWithPassword({ email, password })
  if (error) { errEl.textContent = 'メールアドレスまたはパスワードが違います'; errEl.style.display = 'block'; return }
  redirectByRole(data.user)
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim()
  const email = document.getElementById('reg-email').value.trim()
  const password = document.getElementById('reg-password').value
  const errEl = document.getElementById('reg-error')
  const sucEl = document.getElementById('reg-success')
  errEl.style.display = 'none'; sucEl.style.display = 'none'
  if (!name || !email || !password || !selectedRole) { errEl.textContent = '全ての項目を入力してください'; errEl.style.display = 'block'; return }
  if (password.length < 6) { errEl.textContent = 'パスワードは6文字以上にしてください'; errEl.style.display = 'block'; return }
  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { role: selectedRole, display_name: name } }
  })
  if (error) { errEl.textContent = '登録に失敗しました: ' + error.message; errEl.style.display = 'block'; return }
  sucEl.textContent = '登録完了！メールを確認してログインしてください。'
  sucEl.style.display = 'block'
}

init()
</script>
</body>
</html>
