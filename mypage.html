<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
<style>
.tool-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.tool-toggle { padding:7px 14px; font-size:13px; border:1px solid #ddd; border-radius:6px; background:#fff; cursor:pointer; transition:all .12s; }
.tool-toggle.active-info { background:#cfe2ff; border:2px solid #0d6efd; color:#084298; font-weight:600; }
.tool-options { display:none; gap:6px; flex-wrap:wrap; align-items:center; }
.tool-options.open { display:flex; }
</style>
</head>
<body>
<nav>
  <a href="form.html">フォーム提出</a>
  <a href="table.html">きっかけ表</a>
  <a href="mypage.html" class="active">マイページ</a>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn-sm" onclick="logout()">ログアウト</button>
  </div>
</nav>
<main>
  <h1 style="margin-bottom:20px;">マイページ</h1>

  <!-- ユーザー名編集 -->
  <div class="card" style="margin-bottom:16px;">
    <h2 style="margin-bottom:16px;">プロフィール</h2>
    <div class="field">
      <label>表示名</label>
      <div style="display:flex;gap:8px;">
        <input id="display-name-input" placeholder="表示名を入力" style="flex:1;">
        <button onclick="saveDisplayName()" class="btn-primary btn-sm">保存</button>
      </div>
    </div>
    <p id="name-saved" style="color:#198754;font-size:13px;display:none;">✓ 保存しました</p>
  </div>

  <!-- ユニット -->
  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin-bottom:0;">ユニット</h2>
      <button onclick="showAddUnit()" class="btn-sm">＋ 追加</button>
    </div>
    <div id="unit-list"><p class="hint">読み込み中...</p></div>
    <div id="add-unit-form" style="display:none;margin-top:16px;border-top:1px solid #eee;padding-top:16px;">
      <div class="field"><label>ユニット名</label><input id="new-unit-name" placeholder="例: 誕生石"></div>
      <div style="display:flex;gap:8px;">
        <button onclick="addUnit()" class="btn-primary btn-sm">作成</button>
        <button onclick="hideAddUnit()">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- ネタ一覧 -->
  <div class="card" id="neta-section" style="display:none;margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="margin-bottom:0;">ネタ一覧 <span id="selected-unit-name" style="font-size:14px;color:#888;"></span></h2>
      <button onclick="showNetaForm(null)" class="btn-sm">＋ 追加</button>
    </div>
    <div id="neta-list"></div>
  </div>

  <!-- ネタ登録・編集フォーム（form.htmlと同じ構成） -->
  <div class="card" id="neta-form-card" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 id="neta-form-title" style="margin-bottom:0;">ネタを追加</h2>
      <button onclick="hideNetaForm()" class="btn-sm">キャンセル</button>
    </div>
    <input type="hidden" id="edit-neta-id">

    <div class="field">
      <label>ネタタイトル <span class="req">*</span></label>
      <input id="neta-title" placeholder="例: 病院コント">
    </div>

    <div class="field">
      <label>② 形式</label>
      <div class="btn-group" id="neta-format-group">
        <button class="tog-btn" onclick="nSetFormat('漫才')">漫才</button>
        <button class="tog-btn" onclick="nSetFormat('ピン')">ピン</button>
        <button class="tog-btn" onclick="nSetFormat('コント')">コント</button>
      </div>
    </div>

    <div id="neta-manzai-note" style="display:none;" class="banner-info">漫才は②⑧のみ入力してください</div>

    <div id="neta-konto-fields" style="display:none;">

      <!-- ③ 道具（form.htmlと同じ展開形式） -->
      <div class="field">
        <label>③ 使用道具</label>
        <p class="hint" style="margin-bottom:8px;">使用する道具をクリックして数を選んでください</p>
        <div class="tool-row">
          <button class="tool-toggle" id="n-desk-toggle" onclick="nToggleTool('desk')">机</button>
          <div class="tool-options" id="n-desk-options">
            <button class="tog-btn" onclick="nSetTool('desk',1)">1台</button>
            <button class="tog-btn" onclick="nSetTool('desk',2)">2台</button>
            <button class="tog-btn" onclick="nSetTool('desk','custom')">手動</button>
            <input id="n-desk-custom" type="number" placeholder="台数" style="width:70px;display:none;" min="1">
            <button class="tog-btn" style="color:#dc3545;" onclick="nClearTool('desk')">✕</button>
          </div>
        </div>
        <div class="tool-row">
          <button class="tool-toggle" id="n-chair-toggle" onclick="nToggleTool('chair')">椅子</button>
          <div class="tool-options" id="n-chair-options">
            <button class="tog-btn" onclick="nSetTool('chair',1)">1脚</button>
            <button class="tog-btn" onclick="nSetTool('chair',2)">2脚</button>
            <button class="tog-btn" onclick="nSetTool('chair','custom')">手動</button>
            <input id="n-chair-custom" type="number" placeholder="脚数" style="width:70px;display:none;" min="1">
            <button class="tog-btn" style="color:#dc3545;" onclick="nClearTool('chair')">✕</button>
          </div>
        </div>
        <div class="tool-row">
          <button class="tool-toggle" id="n-mic-toggle" onclick="nToggleTool('mic')">ハンドマイク</button>
          <div class="tool-options" id="n-mic-options">
            <button class="tog-btn" onclick="nSetTool('mic',1)">1本</button>
            <button class="tog-btn" onclick="nSetTool('mic',2)">2本</button>
            <button class="tog-btn" onclick="nSetTool('mic','custom')">手動</button>
            <input id="n-mic-custom" type="number" placeholder="本数" style="width:70px;display:none;" min="1">
            <button class="tog-btn" style="color:#dc3545;" onclick="nClearTool('mic')">✕</button>
          </div>
        </div>
        <div class="tool-row">
          <button class="tool-toggle" id="n-other-toggle" onclick="nToggleTool('other')">その他</button>
          <div class="tool-options" id="n-other-options">
            <input id="n-other-custom" type="text" placeholder="道具名を入力（例: 台本、スタンドマイク）" style="flex:1;min-width:160px;">
            <button class="tog-btn" style="color:#dc3545;" onclick="nClearTool('other')">✕</button>
          </div>
        </div>
      </div>

      <!-- ④ 板付 -->
      <div class="field">
        <label>④ 板付人数</label>
        <div class="btn-group" id="neta-itatsuki-group">
          <button class="tog-btn" onclick="nSetItatsuki(0)">0人</button>
          <button class="tog-btn" onclick="nSetItatsuki(1)">1人</button>
          <button class="tog-btn" onclick="nSetItatsuki(2)">2人</button>
          <button class="tog-btn" onclick="nSetItatsuki(3)">3人</button>
          <button class="tog-btn" onclick="nSetItatsuki(4)">4人</button>
          <button class="tog-btn" onclick="nSetItatsuki('custom')">手動</button>
        </div>
        <input id="neta-itatsuki-custom" type="number" placeholder="人数" style="width:100px;margin-top:8px;display:none;" min="0">
      </div>

      <!-- ⑤ 音照 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="field">
          <label>⑤ 途中音響</label>
          <div class="btn-group">
            <button class="tog-btn" id="n-on-ari" onclick="nSetToggle('on','有り')">有り</button>
            <button class="tog-btn" id="n-on-nasi" onclick="nSetToggle('on','無し')">無し</button>
          </div>
        </div>
        <div class="field">
          <label>⑤ 途中照明</label>
          <div class="btn-group">
            <button class="tog-btn" id="n-hari-ari" onclick="nSetToggle('hari','有り')">有り</button>
            <button class="tog-btn" id="n-hari-nasi" onclick="nSetToggle('hari','無し')">無し</button>
          </div>
        </div>
      </div>

      <!-- ⑥ 明転 -->
      <div class="field">
        <label>⑥ 明転きっかけ</label>
        <div class="btn-group" id="neta-meiten-group">
          <button class="tog-btn" onclick="nSetKikake('meiten','がなり明転')">がなり明転</button>
          <button class="tog-btn" onclick="nSetKikake('meiten','台詞明転')">台詞明転</button>
          <button class="tog-btn" onclick="nSetKikake('meiten','その他')">その他</button>
        </div>
        <input id="neta-meiten-detail" placeholder="台詞 / 詳細を入力" style="margin-top:8px;display:none;">
      </div>

      <!-- ⑦ 暗転 -->
      <div class="field">
        <label>⑦ 暗転きっかけ</label>
        <div class="btn-group" id="neta-anten-group">
          <button class="tog-btn" onclick="nSetKikake('anten','挨拶終わり')">挨拶終わり</button>
          <button class="tog-btn" onclick="nSetKikake('anten','台詞暗転')">台詞暗転</button>
          <button class="tog-btn" onclick="nSetKikake('anten','その他')">その他</button>
        </div>
        <input id="neta-anten-detail" placeholder="台詞 / 詳細を入力" style="margin-top:8px;display:none;">
      </div>
    </div>

    <!-- ⑧ 出囃子 -->
    <div class="field" id="neta-debayashi-field" style="display:none;">
      <label>⑧ 出囃子</label>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input id="neta-debayashi" placeholder="タイトル（例: Anything Goes!）" style="flex:1;" oninput="nOnDebayashiInput()">
        <button id="neta-nasi-btn" class="tog-btn" onclick="nSetNasi()" style="flex:0 0 56px;">ナシ</button>
      </div>
      <input id="neta-debayashi-artist" placeholder="アーティスト名（例: 大黒摩季）" style="display:none;">
      <p class="hint" style="margin-top:4px;">原則Apple Musicにある曲でお願いします</p>
    </div>

    <button onclick="saveNeta()" class="btn-primary" style="width:100%;">保存する</button>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://hmfbbpglitxggrfxghsd.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZmJicGdsaXR4Z2dyZnhnaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzQ4ODAsImV4cCI6MjA5MTU1MDg4MH0.lM2QipgSzFuHqS-IQ5_CndIBTiMQd43kvdMCXLcAkSA'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let user = null, selectedUnitId = null, selectedUnitName = ''
let nState = {}

function nReset() {
  nState = { format:'', desk:null, chair:null, mic:null, other:null, on:'', hari:'', meiten:'', anten:'', itatsuki:null, nasiMode:false }
  document.querySelectorAll('#neta-form-card .tog-btn').forEach(b => b.classList.remove('active-info','active-warn','active-ok'))
  document.querySelectorAll('#neta-form-card .tool-toggle').forEach(b => b.classList.remove('active-info'))
  document.querySelectorAll('#neta-form-card .tool-options').forEach(o => o.classList.remove('open'))
  ;['n-desk-custom','n-chair-custom','n-mic-custom'].forEach(id => { const el=document.getElementById(id); if(el){el.style.display='none';el.value=''} })
  document.getElementById('n-other-custom').value = ''
  document.getElementById('neta-itatsuki-custom').style.display = 'none'
  document.getElementById('neta-meiten-detail').style.display = 'none'
  document.getElementById('neta-anten-detail').style.display = 'none'
  document.getElementById('neta-debayashi-field').style.display = 'none'
  document.getElementById('neta-manzai-note').style.display = 'none'
  document.getElementById('neta-konto-fields').style.display = 'none'
  document.getElementById('n-file-fields').style.display = 'none'
  document.getElementById('n-on-file-field').style.display = 'none'
  document.getElementById('n-script-file-field').style.display = 'none'
  document.getElementById('neta-nasi-btn').classList.remove('active-warn')
  document.getElementById('neta-debayashi').value = ''
  document.getElementById('neta-debayashi-artist').value = ''
  document.getElementById('neta-debayashi-artist').style.display = 'none'
}

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { location.href='index.html'; return }
  user = session.user
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single()
  document.getElementById('nav-user').textContent = profile?.display_name || user.email
  document.getElementById('display-name-input').value = profile?.display_name || ''
  if (profile?.role === 'staff') { location.href='staff.html'; return }
  fetchUnits()
}

async function saveDisplayName(){
  const name=document.getElementById('display-name-input').value.trim()
  if(!name){alert('表示名を入力してください');return}
  await sb.from('profiles').update({display_name:name}).eq('id',user.id)
  document.getElementById('nav-user').textContent=name
  document.getElementById('name-saved').style.display='block'
  setTimeout(()=>document.getElementById('name-saved').style.display='none',3000)
}

async function fetchUnits() {
  const { data } = await sb.from('units').select('*').eq('user_id', user.id).order('created_at')
  const list = document.getElementById('unit-list')
  if (!data || !data.length) { list.innerHTML='<p class="hint">ユニットがまだありません</p>'; return }
  list.innerHTML = data.map(u => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;">
      <button onclick="selectUnit('${u.id}','${u.name.replace(/'/g,"\\'")}') " style="background:none;border:none;font-size:14px;font-weight:500;cursor:pointer;color:#0d6efd;padding:0;">${u.name}</button>
      <button onclick="deleteUnit('${u.id}')" class="btn-sm btn-danger">削除</button>
    </div>`).join('')
}

function showAddUnit() { document.getElementById('add-unit-form').style.display='block' }
function hideAddUnit() { document.getElementById('add-unit-form').style.display='none'; document.getElementById('new-unit-name').value='' }

async function addUnit() {
  const name = document.getElementById('new-unit-name').value.trim()
  if (!name) { alert('ユニット名を入力してください'); return }
  await sb.from('units').insert({ user_id: user.id, name })
  hideAddUnit(); fetchUnits()
}

async function deleteUnit(id) {
  if (!confirm('このユニットとネタをすべて削除しますか？')) return
  await sb.from('units').delete().eq('id', id)
  document.getElementById('neta-section').style.display = 'none'
  document.getElementById('neta-form-card').style.display = 'none'
  fetchUnits()
}

async function selectUnit(id, name) {
  selectedUnitId = id
  selectedUnitName = name
  document.getElementById('selected-unit-name').textContent = `— ${name}`
  document.getElementById('neta-section').style.display = 'block'
  fetchNeta()
}

async function fetchNeta() {
  const { data } = await sb.from('neta').select('*').eq('unit_id', selectedUnitId).order('created_at')
  const list = document.getElementById('neta-list')
  if (!data || !data.length) { list.innerHTML='<p class="hint">ネタがまだありません</p>'; return }
  list.innerHTML = data.map(n => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;">
      <div>
        <p style="font-weight:500;font-size:14px;">${n.title}</p>
        <p class="hint">${n.format||''}${n.debayashi_full?' ・ '+n.debayashi_full:''}</p>
      </div>
      <div style="display:flex;gap:6px;">
        <button onclick='showNetaForm(${JSON.stringify(n).replace(/'/g,"&#39;")})' class="btn-sm">編集</button>
        <button onclick="deleteNeta('${n.id}')" class="btn-sm btn-danger">削除</button>
      </div>
    </div>`).join('')
}

function showNetaForm(n) {
  nReset()
  document.getElementById('edit-neta-id').value = ''
  document.getElementById('neta-title').value = ''

  if (n) {
    document.getElementById('neta-form-title').textContent = 'ネタを編集'
    document.getElementById('edit-neta-id').value = n.id
    document.getElementById('neta-title').value = n.title || ''
    if (n.format) nSetFormat(n.format)
    if (n.tools_desk > 0) { nOpenTool('desk'); nSetTool('desk', n.tools_desk) }
    if (n.tools_chair > 0) { nOpenTool('chair'); nSetTool('chair', n.tools_chair) }
    if (n.tools_mic > 0) { nOpenTool('mic'); nSetTool('mic', n.tools_mic) }
    if (n.chuku_on) nSetToggleVal('on', n.chuku_on)
    if (n.chuku_hari) nSetToggleVal('hari', n.chuku_hari)
    if (n.meiten_type) { nSetKikakeVal('meiten', n.meiten_type); if(n.meiten_detail) document.getElementById('neta-meiten-detail').value=n.meiten_detail }
    if (n.anten_type) { nSetKikakeVal('anten', n.anten_type); if(n.anten_detail) document.getElementById('neta-anten-detail').value=n.anten_detail }
    if (n.itatsuki != null) {
      const num = parseInt(n.itatsuki)
      if (!isNaN(num) && num <= 4) {
        nState.itatsuki = num
        document.querySelectorAll('#neta-itatsuki-group .tog-btn').forEach(b => {
          if (b.textContent === num + '人') b.classList.add('active-info')
        })
      } else {
        nState.itatsuki = 'custom'
        document.getElementById('neta-itatsuki-custom').style.display = 'block'
        document.getElementById('neta-itatsuki-custom').value = String(n.itatsuki).replace('人','')
      }
    }
    if (n.debayashi_full) {
      document.getElementById('neta-debayashi-field').style.display = 'block'
      if (n.debayashi_full === 'ナシ') { nState.nasiMode=false; nSetNasi() }
      else {
        const p = n.debayashi_full.split('/')
        document.getElementById('neta-debayashi').value = p[0]||''
        if (p[1]) { document.getElementById('neta-debayashi-artist').value=p[1]; document.getElementById('neta-debayashi-artist').style.display='block' }
      }
    }
  } else {
    document.getElementById('neta-form-title').textContent = 'ネタを追加'
  }

  document.getElementById('neta-form-card').style.display = 'block'
  document.getElementById('neta-form-card').scrollIntoView({ behavior:'smooth' })
}

function hideNetaForm() { document.getElementById('neta-form-card').style.display='none' }

// ---- 形式 ----
function nSetFormat(f) {
  nState.format = f
  document.querySelectorAll('#neta-format-group .tog-btn').forEach(b => b.classList.toggle('active-info', b.textContent===f))
  document.getElementById('neta-manzai-note').style.display = f==='漫才' ? 'block' : 'none'
  document.getElementById('neta-konto-fields').style.display = f!=='漫才' ? 'block' : 'none'
  document.getElementById('neta-debayashi-field').style.display = 'block'
}

// ---- 道具 ----
function nToggleTool(type) {
  document.getElementById(`n-${type}-options`).classList.contains('open') ? nClearTool(type) : nOpenTool(type)
}
function nOpenTool(type) {
  document.getElementById(`n-${type}-options`).classList.add('open')
  document.getElementById(`n-${type}-toggle`).classList.add('active-info')
  if (!nState[type]) nState[type] = 'open'
}
function nClearTool(type) {
  document.getElementById(`n-${type}-options`).classList.remove('open')
  document.getElementById(`n-${type}-toggle`).classList.remove('active-info')
  nState[type] = null
  document.querySelectorAll(`#n-${type}-options .tog-btn`).forEach(b => b.classList.remove('active-info'))
  const ci = document.getElementById(`n-${type}-custom`)
  if (ci) { ci.style.display='none'; ci.value='' }
  if (type==='other') document.getElementById('n-other-custom').value=''
}
function nSetTool(type, val) {
  nState[type] = val
  document.querySelectorAll(`#n-${type}-options .tog-btn`).forEach(b => {
    const t = b.textContent
    const match = (val===1&&(t==='1台'||t==='1脚'||t==='1本'))
      || (val===2&&(t==='2台'||t==='2脚'||t==='2本'))
      || (val==='custom'&&t==='手動')
    b.classList.toggle('active-info', match)
  })
  const ci = document.getElementById(`n-${type}-custom`)
  if (ci) ci.style.display = val==='custom' ? 'inline-block' : 'none'
}

// ---- 板付 ----
function nSetItatsuki(val) {
  nState.itatsuki = val
  document.querySelectorAll('#neta-itatsuki-group .tog-btn').forEach(b => b.classList.remove('active-info'))
  event.currentTarget.classList.add('active-info')
  document.getElementById('neta-itatsuki-custom').style.display = val==='custom' ? 'block' : 'none'
}

// ---- 音照 ----
function nSetToggle(key, val) {
  nState[key] = val
  const isOn = key==='on'
  document.getElementById(isOn?'n-on-ari':'n-hari-ari').classList.toggle('active-warn', val==='有り')
  document.getElementById(isOn?'n-on-nasi':'n-hari-nasi').classList.toggle('active-ok', val==='無し')
  if (key==='on') document.getElementById('n-on-file-field').style.display = val==='有り' ? 'block' : 'none'
  const need = nState.on==='有り' || nState.hari==='有り'
  document.getElementById('n-file-fields').style.display = need ? 'block' : 'none'
  document.getElementById('n-script-file-field').style.display = need ? 'block' : 'none'
}
function nSetToggleVal(key, val) {
  nState[key] = val
  const isOn = key==='on'
  document.getElementById(isOn?'n-on-ari':'n-hari-ari').classList.toggle('active-warn', val==='有り')
  document.getElementById(isOn?'n-on-nasi':'n-hari-nasi').classList.toggle('active-ok', val==='無し')
  if (key==='on') document.getElementById('n-on-file-field').style.display = val==='有り' ? 'block' : 'none'
  const need = nState.on==='有り' || nState.hari==='有り'
  document.getElementById('n-file-fields').style.display = need ? 'block' : 'none'
  document.getElementById('n-script-file-field').style.display = need ? 'block' : 'none'
}

// ---- きっかけ ----
function nSetKikake(type, val) {
  nState[type] = val
  document.querySelectorAll(`#neta-${type}-group .tog-btn`).forEach(b => b.classList.remove('active-info'))
  event.currentTarget.classList.add('active-info')
  const d = document.getElementById(`neta-${type}-detail`)
  d.style.display = (val==='台詞明転'||val==='台詞暗転'||val==='その他') ? 'block' : 'none'
  d.placeholder = val==='その他' ? '詳細を入力' : '台詞を入力'
}
function nSetKikakeVal(type, val) {
  nState[type] = val
  document.querySelectorAll(`#neta-${type}-group .tog-btn`).forEach(b => b.classList.toggle('active-info', b.textContent===val))
  const d = document.getElementById(`neta-${type}-detail`)
  d.style.display = (val==='台詞明転'||val==='台詞暗転'||val==='その他') ? 'block' : 'none'
}

// ---- 出囃子 ----
function nSetNasi() {
  nState.nasiMode = !nState.nasiMode
  document.getElementById('neta-nasi-btn').classList.toggle('active-warn', nState.nasiMode)
  document.getElementById('neta-debayashi').value = nState.nasiMode ? 'ナシ' : ''
  document.getElementById('neta-debayashi-artist').style.display = nState.nasiMode ? 'none' : 'block'
}
function nOnDebayashiInput() {
  const v = document.getElementById('neta-debayashi').value
  if (v !== 'ナシ') { nState.nasiMode=false; document.getElementById('neta-nasi-btn').classList.remove('active-warn') }
  document.getElementById('neta-debayashi-artist').style.display = (!nState.nasiMode && v) ? 'block' : 'none'
}

// ---- 道具テキスト ----
function nGetToolsText() {
  const parts = []
  const getVal = (type, unit) => {
    if (!nState[type] || nState[type]==='open') return null
    if (nState[type]==='custom') { const v=document.getElementById(`n-${type}-custom`)?.value; return v?`${v}${unit}`:null }
    return `${nState[type]}${unit}`
  }
  if (getVal('desk','台')) parts.push(`机${getVal('desk','台')}`)
  if (getVal('chair','脚')) parts.push(`椅子${getVal('chair','脚')}`)
  if (getVal('mic','本')) parts.push(`マイク${getVal('mic','本')}`)
  const other = document.getElementById('n-other-custom')?.value
  if (nState.other && nState.other!==null && other) parts.push(other)
  return parts.join(' ') || null
}
function nGetItatsuki() {
  if (nState.itatsuki === null) return null
  if (nState.itatsuki === 'custom') return document.getElementById('neta-itatsuki-custom').value + '人'
  return nState.itatsuki + '人'
}

async function saveNeta() {
  const title = document.getElementById('neta-title').value.trim()
  if (!title) { alert('ネタタイトルを入力してください'); return }

  const btn = document.querySelector('#neta-form-card .btn-primary')
  btn.textContent = '保存中...'; btn.disabled = true

  try {
    const deb = document.getElementById('neta-debayashi').value
    const debArtist = document.getElementById('neta-debayashi-artist').value
    const debFull = deb==='ナシ' ? 'ナシ' : [deb, debArtist].filter(Boolean).join('/')

    let onPath = null, scriptPath = null
    const onFile = document.getElementById('n-on-file')?.files[0]
    const scriptFile = document.getElementById('n-script-file')?.files[0]
    if (onFile) { const p=`on/${Date.now()}_${onFile.name}`; await sb.storage.from('kikkake-files').upload(p, onFile); onPath=p }
    if (scriptFile) { const p=`script/${Date.now()}_${scriptFile.name}`; await sb.storage.from('kikkake-files').upload(p, scriptFile); scriptPath=p }

    const editId = document.getElementById('edit-neta-id').value
    const payload = {
      unit_id: selectedUnitId,
      title,
      format: nState.format || null,
      tools_desk: typeof nState.desk==='number' ? nState.desk : (nState.desk==='custom' ? parseInt(document.getElementById('n-desk-custom').value)||0 : 0),
      tools_chair: typeof nState.chair==='number' ? nState.chair : (nState.chair==='custom' ? parseInt(document.getElementById('n-chair-custom').value)||0 : 0),
      tools_mic: typeof nState.mic==='number' ? nState.mic : (nState.mic==='custom' ? parseInt(document.getElementById('n-mic-custom').value)||0 : 0),
      chuku_on: nState.on || null,
      chuku_hari: nState.hari || null,
      meiten_type: nState.meiten || null,
      meiten_detail: document.getElementById('neta-meiten-detail').value || null,
      anten_type: nState.anten || null,
      anten_detail: document.getElementById('neta-anten-detail').value || null,
      itatsuki: nGetItatsuki(),
      debayashi_full: debFull || null,
      on_file_path: onPath,
      script_file_path: scriptPath,
    }

    if (editId) await sb.from('neta').update(payload).eq('id', editId)
    else await sb.from('neta').insert(payload)

    hideNetaForm()
    fetchNeta()
  } catch(e) { alert('エラーが発生しました'); console.error(e) }

  btn.textContent = '保存する'; btn.disabled = false
}

async function deleteNeta(id) {
  if (!confirm('このネタを削除しますか？')) return
  await sb.from('neta').delete().eq('id', id)
  fetchNeta()
}

function logout() { sb.auth.signOut().then(() => location.href='index.html') }
init()
</script>
