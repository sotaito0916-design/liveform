<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライブ管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div id="login-screen" style="max-width:320px;margin:4rem auto;text-align:center;padding:0 1rem;">
    <h1 style="margin-bottom:8px;">ライブ管理</h1>
    <p style="color:#888;font-size:13px;margin-bottom:24px;">管理者専用ページ</p>
    <div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:24px;">
      <div class="field"><label>パスワード</label><input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') login()"></div>
      <button onclick="login()" class="btn-primary" style="width:100%;">ログイン</button>
      <p id="pw-error" style="color:#dc3545;font-size:13px;margin-top:10px;display:none;">パスワードが違います</p>
    </div>
  </div>

  <div id="admin-screen" style="display:none;max-width:760px;margin:0 auto;padding:1.5rem 1rem 4rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h1>ライブ管理</h1>
      <button onclick="doLogout()" class="btn-sm">ログアウト</button>
    </div>

    <!-- ライブ追加・編集フォーム -->
    <div class="card" style="margin-bottom:24px;">
      <h3 id="form-title" style="margin-bottom:16px;">新しいライブを追加</h3>
      <input type="hidden" id="edit-live-id">
      <div class="field">
        <label>ライブ名 <span class="req">*</span></label>
        <input id="live-name" placeholder="例: 新歓ライブ vol.2">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div class="field" style="margin-bottom:0;"><label>開催日</label><input type="date" id="live-date"></div>
        <div class="field" style="margin-bottom:0;"><label>提出締切</label><input type="datetime-local" id="live-deadline"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="saveLive()" class="btn-primary" id="save-btn" style="flex:1;">ライブを作成</button>
        <button onclick="cancelEdit()" id="cancel-btn" style="display:none;">キャンセル</button>
      </div>
    </div>

    <p class="hint" id="live-count" style="margin-bottom:12px;"></p>
    <div id="live-list"></div>
  </div>
</main>

<script>
const SUPABASE_URL='https://hmfbbpglitxggrfxghsd.supabase.co'
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZmJicGdsaXR4Z2dyZnhnaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzQ4ODAsImV4cCI6MjA5MTU1MDg4MH0.lM2QipgSzFuHqS-IQ5_CndIBTiMQd43kvdMCXLcAkSA'
const ADMIN_PASSWORD='LUDO2026'
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY)

// 展開中のパネル管理
const openPanels={}

function login(){
  if(document.getElementById('pw-input').value===ADMIN_PASSWORD){
    sessionStorage.setItem('admin_authed','1')
    document.getElementById('pw-error').style.display='none'
    showAdmin()
  } else {
    document.getElementById('pw-error').style.display='block'
  }
}

function doLogout(){
  sessionStorage.removeItem('admin_authed')
  document.getElementById('admin-screen').style.display='none'
  document.getElementById('login-screen').style.display='block'
  document.getElementById('pw-input').value=''
}

function showAdmin(){
  document.getElementById('login-screen').style.display='none'
  document.getElementById('admin-screen').style.display='block'
  fetchLives()
}

async function fetchLives(){
  const {data}=await sb.from('lives').select('*').order('created_at',{ascending:false})
  const lives=data||[]
  document.getElementById('live-count').textContent=`作成済みライブ（${lives.length}件）`
  const list=document.getElementById('live-list')
  list.innerHTML=''
  if(!lives.length){list.innerHTML='<p class="hint">まだライブがありません</p>';return}
  lives.forEach(l=>{
    const card=document.createElement('div')
    card.id=`live-card-${l.id}`
    card.style.cssText='border:1px solid #eee;border-radius:8px;margin-bottom:12px;overflow:hidden;'
    card.innerHTML=`
      <div style="padding:12px 14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <div>
            <p style="font-weight:500;font-size:15px;">${l.name}</p>
            <p class="hint" style="font-size:12px;margin-top:4px;">${[l.date?`開催: ${l.date}`:'',l.deadline?`締切: ${l.deadline.replace('T',' ').slice(0,16)}`:''].filter(Boolean).join(' ・ ')}</p>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button onclick="startEdit('${l.id}','${l.name.replace(/'/g,"\\'")}','${l.date||''}','${l.deadline||''}')" class="btn-sm">編集</button>
            <button onclick="deleteLive('${l.id}','${l.name.replace(/'/g,"\\'")}') " class="btn-sm btn-danger">削除</button>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;border-top:1px solid #f0f0f0;padding-top:10px;">
          <button onclick="togglePanel('${l.id}','entries')" id="btn-entries-${l.id}" class="btn-sm">提出一覧</button>
          <button onclick="togglePanel('${l.id}','staff')" id="btn-staff-${l.id}" class="btn-sm">スタッフ</button>
        </div>
      </div>
      <div id="panel-${l.id}" style="display:none;border-top:1px solid #eee;background:#fafafa;padding:14px;"></div>
    `
    list.appendChild(card)
  })
}

async function togglePanel(liveId, tab){
  const panel=document.getElementById(`panel-${liveId}`)
  const entriesBtn=document.getElementById(`btn-entries-${liveId}`)
  const staffBtn=document.getElementById(`btn-staff-${liveId}`)
  const current=openPanels[liveId]

  // 同じタブを押したら閉じる
  if(current===tab){
    panel.style.display='none'
    openPanels[liveId]=null
    entriesBtn.classList.remove('active-info')
    staffBtn.classList.remove('active-info')
    return
  }

  openPanels[liveId]=tab
  panel.style.display='block'

  entriesBtn.classList.toggle('active-info', tab==='entries')
  staffBtn.classList.toggle('active-info', tab==='staff')

  if(tab==='entries') await renderEntries(liveId, panel)
  if(tab==='staff') await renderStaff(liveId, panel)
}

async function renderEntries(liveId, panel){
  panel.innerHTML='<p class="hint" style="font-size:13px;">読み込み中...</p>'

  const {data:entries}=await sb.from('entries').select('*').eq('live_id',liveId).order('order',{ascending:true})

  if(!entries||!entries.length){
    panel.innerHTML='<p class="hint" style="font-size:13px;">提出がまだありません</p>'
    return
  }

  // 音響ファイルを取得
  const combiNames=entries.map(e=>e.combi_name)
  const {data:onFiles}=await sb.from('on_files').select('*').eq('live_id',liveId).in('combi_name',combiNames)
  const onFilesMap={}
  ;(onFiles||[]).forEach(f=>{
    if(!onFilesMap[f.combi_name]) onFilesMap[f.combi_name]=[]
    onFilesMap[f.combi_name].push(f)
  })

  const rows=entries.map(e=>{
    const hasScript=!!e.script_file_path
    const onList=onFilesMap[e.combi_name]||[]
    const onCell=onList.length
      ? onList.map(f=>`<button onclick="downloadFile('${f.file_path}','${e.combi_name}_${f.file_label||'音響'}')" style="display:block;color:#0d6efd;font-size:12px;background:none;border:none;cursor:pointer;padding:0;margin-bottom:2px;">${f.file_label||'DL'}</button>`).join('')
      : e.chuku_on==='有り'?'<span style="color:#dc3545;font-weight:600;font-size:12px;">⚠️未</span>':'<span class="muted">−</span>'
    const scriptCell=e.script_method==='当日持参'
      ? '<span style="font-size:12px;color:#856404;">当日持参</span>'
      : hasScript
        ? `<button onclick="downloadFile('${e.script_file_path}','${e.combi_name}_台本')" style="color:#0d6efd;font-size:12px;background:none;border:none;cursor:pointer;padding:0;">DL</button>`
        : e.script_method==='事前提出'
          ? '<span style="color:#dc3545;font-size:12px;font-weight:600;">⚠️未</span>'
          : '<span class="muted">−</span>'
    return `<tr>
      <td>${e.order??'<span class="muted">−</span>'}</td>
      <td style="font-weight:500;white-space:nowrap;">
        ${e.combi_name}${e.is_updated&&!e.update_confirmed?'<span class="badge badge-updated">更新</span>':''}
        ${e.combi_furigana?`<div style="font-size:11px;color:#888;font-weight:400;">${e.combi_furigana}</div>`:''}
      </td>
      <td>${e.format==='漫才'?'<span class="badge" style="background:#d1e7dd;color:#0f5132;">漫才</span>':e.format==='ピン'?'<span class="badge" style="background:#e2d9f3;color:#432874;">ピン</span>':e.format==='コント'?'<span class="badge" style="background:#cfe2ff;color:#084298;">コント</span>':'<span class="muted">−</span>'}</td>
      <td>${e.tools||'<span class="muted">−</span>'}</td>
      <td>${e.itatsuki||'<span class="muted">−</span>'}</td>
      <td>${e.chuku_on==='有り'?'<span class="badge badge-warn">有り</span>':e.chuku_on==='無し'?'<span class="badge badge-ok">無し</span>':'<span class="muted">−</span>'}</td>
      <td>${e.chuku_hari==='有り'?'<span class="badge badge-warn">有り</span>':e.chuku_hari==='無し'?'<span class="badge badge-ok">無し</span>':'<span class="muted">−</span>'}</td>
      <td>${e.meiten_kikake||'<span class="muted">−</span>'}</td>
      <td>${e.anten_kikake||'<span class="muted">−</span>'}</td>
      <td>
        <div style="white-space:nowrap;">${e.debayashi_full||'<span class="muted">−</span>'}</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px;">出囃子</div>
      </td>
      <td>
        <div>${onCell}</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px;">音源</div>
      </td>
      <td>
        <div>${scriptCell}</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px;">台本</div>
      </td>
    </tr>`
  }).join('')

  panel.innerHTML=`
    <div style="overflow-x:auto;">
      <table class="kikkake-table" style="background:#fff;">
        <thead>
          <tr>
            <th>出番</th><th>コンビ名</th><th>形式</th><th>道具</th><th>板付</th>
            <th>音響</th><th>照明</th><th>明転</th><th>暗転</th>
            <th>出囃子</th><th>音源</th><th>台本</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `
}

async function renderStaff(liveId, panel){
  panel.innerHTML='<p class="hint" style="font-size:13px;">読み込み中...</p>'

  const {data:sl, error:slErr}=await sb.from('staff_lives').select('user_id').eq('live_id',liveId)
  if(slErr){panel.innerHTML=`<p style="color:red;font-size:13px;">エラー: ${slErr.message}</p>`;return}
  if(!sl||!sl.length){panel.innerHTML='<p class="hint" style="font-size:13px;">参加スタッフがまだいません</p>';return}

  const userIds=sl.map(s=>s.user_id)
  const {data:profiles, error:pErr}=await sb.from('profiles').select('id,display_name,email').in('id',userIds)
  if(pErr){panel.innerHTML=`<p style="color:red;font-size:13px;">プロフィール取得エラー: ${pErr.message}</p>`;return}

  const profileMap={}
  ;(profiles||[]).forEach(p=>profileMap[p.id]=p)

  panel.innerHTML=`
    <p class="hint" style="margin-bottom:12px;font-size:13px;">参加スタッフ ${sl.length}名</p>
    ${sl.map(s=>{
      const p=profileMap[s.user_id]||{}
      const initial=(p.display_name||p.email||'?')[0].toUpperCase()
      return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f0f0f0;">
        <div style="width:30px;height:30px;border-radius:50%;background:#cfe2ff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#084298;flex-shrink:0;">${initial}</div>
        <div>
          <p style="font-weight:500;font-size:13px;">${p.display_name||'名前未設定'}</p>
          <p class="hint" style="font-size:12px;">${p.email||''}</p>
        </div>
      </div>`
    }).join('')}
  `
}

async function saveLive(){
  const name=document.getElementById('live-name').value.trim()
  if(!name){alert('ライブ名を入力してください');return}
  const payload={name,date:document.getElementById('live-date').value||null,deadline:document.getElementById('live-deadline').value||null}
  const editId=document.getElementById('edit-live-id').value
  if(editId) await sb.from('lives').update(payload).eq('id',editId)
  else await sb.from('lives').insert(payload)
  cancelEdit(); fetchLives()
}

function startEdit(id,name,date,deadline){
  document.getElementById('edit-live-id').value=id
  document.getElementById('live-name').value=name
  document.getElementById('live-date').value=date
  document.getElementById('live-deadline').value=deadline
  document.getElementById('form-title').textContent='ライブを編集'
  document.getElementById('save-btn').textContent='変更を保存'
  document.getElementById('cancel-btn').style.display='inline-block'
  window.scrollTo({top:0,behavior:'smooth'})
}

function cancelEdit(){
  document.getElementById('edit-live-id').value=''
  document.getElementById('live-name').value=''
  document.getElementById('live-date').value=''
  document.getElementById('live-deadline').value=''
  document.getElementById('form-title').textContent='新しいライブを追加'
  document.getElementById('save-btn').textContent='ライブを作成'
  document.getElementById('cancel-btn').style.display='none'
}

async function deleteLive(id,name){
  if(!confirm(`「${name}」を削除しますか？\n提出データも全て消えます`))return
  await sb.from('lives').delete().eq('id',id)
  fetchLives()
}

async function downloadFile(path,filename){
  try{
    const {data,error}=await sb.storage.from('kikkake-files').download(path)
    if(error) throw error
    const url=URL.createObjectURL(data)
    const a=document.createElement('a')
    a.href=url;a.download=filename||path.split('/').pop()
    document.body.appendChild(a);a.click()
    document.body.removeChild(a);URL.revokeObjectURL(url)
  }catch(e){alert('ダウンロードに失敗しました: '+e.message);console.error(e)}
}

if(sessionStorage.getItem('admin_authed')==='1') showAdmin()
</script>
</body>
</html>
