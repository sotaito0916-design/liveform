<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライブ管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <!-- ログイン画面 -->
  <div id="login-screen" style="max-width:320px;margin:4rem auto;text-align:center;padding:0 1rem;">
    <h1 style="margin-bottom:8px;">ライブ管理</h1>
    <p style="color:#888;font-size:13px;margin-bottom:24px;">管理者専用ページ</p>
    <div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:24px;">
      <div class="field"><label>パスワード</label><input type="password" id="pw-input" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter') login()"></div>
      <button onclick="login()" class="btn-primary" style="width:100%;">ログイン</button>
      <p id="pw-error" style="color:#dc3545;font-size:13px;margin-top:10px;display:none;">パスワードが違います</p>
    </div>
  </div>

  <!-- 管理画面 -->
  <div id="admin-screen" style="display:none;max-width:680px;margin:0 auto;padding:1.5rem 1rem 4rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h1>ライブ管理</h1>
      <button onclick="doLogout()" class="btn-sm">ログアウト</button>
    </div>

    <!-- ライブ追加・編集フォーム -->
    <div class="card" style="margin-bottom:24px;">
      <h3 id="form-title" style="margin-bottom:16px;">新しいライブを追加</h3>
      <input type="hidden" id="edit-live-id">
      <div class="field">
        <label>ライブ名 <span class="req">*</span></label>
        <input id="live-name" placeholder="例: 新歓ライブ vol.2">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div class="field" style="margin-bottom:0;"><label>開催日</label><input type="date" id="live-date"></div>
        <div class="field" style="margin-bottom:0;"><label>提出締切</label><input type="datetime-local" id="live-deadline"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="saveLive()" class="btn-primary" id="save-btn" style="flex:1;">ライブを作成</button>
        <button onclick="cancelEdit()" id="cancel-btn" style="display:none;">キャンセル</button>
      </div>
    </div>

    <!-- ライブ一覧 -->
    <p class="hint" id="live-count" style="margin-bottom:12px;"></p>
    <div id="live-list"></div>

    <!-- 詳細パネル -->
    <div id="detail-section" style="display:none;margin-top:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
        <h2 id="detail-live-name" style="margin-bottom:0;font-size:16px;color:#888;"></h2>
        <button onclick="closeDetail()" class="btn-sm">閉じる</button>
      </div>

      <!-- タブ -->
      <div style="display:flex;border-bottom:1px solid #eee;margin-bottom:16px;">
        <button class="tab-btn active" id="tab-entries" onclick="switchTab('entries')">提出一覧</button>
        <button class="tab-btn" id="tab-staff" onclick="switchTab('staff')">参加スタッフ</button>
      </div>

      <!-- 提出一覧 -->
      <div id="panel-entries">
        <div style="overflow-x:auto;">
          <table class="kikkake-table" id="entries-table" style="display:none;">
            <thead>
              <tr>
                <th>出番</th><th>コンビ名</th><th>形式</th><th>道具</th><th>板付</th>
                <th>音響</th><th>照明</th><th>明転</th><th>暗転</th>
                <th>出囃子</th><th>音源</th><th>台本</th><th>操作</th>
              </tr>
              <tr style="background:#fafafa;">
                <th colspan="9"></th>
                <th style="color:#888;font-weight:400;font-size:11px;">↓2行目</th>
                <th style="color:#888;font-weight:400;font-size:11px;">↓2行目</th>
                <th style="color:#888;font-weight:400;font-size:11px;">↓2行目</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="entries-body"></tbody>
          </table>
          <p id="entries-empty" style="color:#888;font-size:13px;display:none;">提出がまだありません</p>
        </div>
      </div>

      <!-- スタッフリスト -->
      <div id="panel-staff" style="display:none;">
        <div id="staff-list"></div>
      </div>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://hmfbbpglitxggrfxghsd.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZmJicGdsaXR4Z2dyZnhnaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzQ4ODAsImV4cCI6MjA5MTU1MDg4MH0.lM2QipgSzFuHqS-IQ5_CndIBTiMQd43kvdMCXLcAkSA'
const ADMIN_PASSWORD = 'LUDO2026'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let currentLiveId = null

function login() {
  if (document.getElementById('pw-input').value === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_authed', '1')
    document.getElementById('pw-error').style.display = 'none'
    showAdmin()
  } else {
    document.getElementById('pw-error').style.display = 'block'
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_authed')
  document.getElementById('admin-screen').style.display = 'none'
  document.getElementById('login-screen').style.display = 'block'
  document.getElementById('pw-input').value = ''
}

function showAdmin() {
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('admin-screen').style.display = 'block'
  fetchLives()
}

async function fetchLives() {
  const { data } = await sb.from('lives').select('*').order('created_at', { ascending: false })
  const lives = data || []
  document.getElementById('live-count').textContent = `作成済みライブ（${lives.length}件）`
  document.getElementById('live-list').innerHTML = lives.length ? lives.map(l => `
    <div style="border:1px solid #eee;border-radius:8px;padding:12px 14px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <p style="font-weight:500;font-size:15px;">${l.name}</p>
          <p class="hint" style="font-size:12px;margin-top:4px;">${[l.date?`開催: ${l.date}`:'', l.deadline?`締切: ${l.deadline.replace('T',' ').slice(0,16)}`:''].filter(Boolean).join(' ・ ')}</p>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button onclick="startEdit('${l.id}','${l.name.replace(/'/g,"\\'")}','${l.date||''}','${l.deadline||''}')" class="btn-sm">編集</button>
          <button onclick="deleteLive('${l.id}','${l.name.replace(/'/g,"\\'")}') " class="btn-sm btn-danger">削除</button>
        </div>
      </div>
      <!-- 提出一覧・スタッフタブをライブカード内に表示 -->
      <div style="display:flex;border-top:1px solid #eee;margin-top:10px;padding-top:10px;gap:8px;">
        <button onclick="openDetail('${l.id}','${l.name.replace(/'/g,"\\'")}','entries')" class="btn-sm">提出一覧</button>
        <button onclick="openDetail('${l.id}','${l.name.replace(/'/g,"\\'")}','staff')" class="btn-sm">スタッフ</button>
      </div>
      </div>
    </div>
  `).join('') : '<p class="hint">まだライブがありません</p>'
}

async function saveLive() {
  const name = document.getElementById('live-name').value.trim()
  if (!name) { alert('ライブ名を入力してください'); return }
  const payload = {
    name,
    date: document.getElementById('live-date').value || null,
    deadline: document.getElementById('live-deadline').value || null
  }
  const editId = document.getElementById('edit-live-id').value
  if (editId) await sb.from('lives').update(payload).eq('id', editId)
  else await sb.from('lives').insert(payload)
  cancelEdit()
  fetchLives()
}

function startEdit(id, name, date, deadline) {
  document.getElementById('edit-live-id').value = id
  document.getElementById('live-name').value = name
  document.getElementById('live-date').value = date
  document.getElementById('live-deadline').value = deadline
  document.getElementById('form-title').textContent = 'ライブを編集'
  document.getElementById('save-btn').textContent = '変更を保存'
  document.getElementById('cancel-btn').style.display = 'inline-block'
  window.scrollTo({ top: 0, behavior: 'smooth' })
}

function cancelEdit() {
  document.getElementById('edit-live-id').value = ''
  document.getElementById('live-name').value = ''
  document.getElementById('live-date').value = ''
  document.getElementById('live-deadline').value = ''
  document.getElementById('form-title').textContent = '新しいライブを追加'
  document.getElementById('save-btn').textContent = 'ライブを作成'
  document.getElementById('cancel-btn').style.display = 'none'
}

async function deleteLive(id, name) {
  if (!confirm(`「${name}」を削除しますか？\n提出データも全て消えます`)) return
  await sb.from('lives').delete().eq('id', id)
  if (currentLiveId === id) closeDetail()
  fetchLives()
}

function openDetail(liveId, liveName, tab) {
  currentLiveId = liveId
  document.getElementById('detail-live-name').textContent = liveName
  document.getElementById('detail-section').style.display = 'block'
  document.getElementById('detail-section').scrollIntoView({ behavior: 'smooth' })
  switchTab(tab)
}

function switchTab(tab) {
  document.getElementById('tab-entries').classList.toggle('active', tab === 'entries')
  document.getElementById('tab-staff').classList.toggle('active', tab === 'staff')
  document.getElementById('panel-entries').style.display = tab === 'entries' ? 'block' : 'none'
  document.getElementById('panel-staff').style.display = tab === 'staff' ? 'block' : 'none'
  if (tab === 'entries') loadEntries()
  if (tab === 'staff') loadStaff()
}

async function loadEntries() {
  const { data } = await sb.from('entries').select('*').eq('live_id', currentLiveId).order('order', { ascending: true })
  const entries = data || []
  if (!entries.length) {
    document.getElementById('entries-table').style.display = 'none'
    document.getElementById('entries-empty').style.display = 'block'
    return
  }
  document.getElementById('entries-empty').style.display = 'none'
  document.getElementById('entries-table').style.display = 'table'
  document.getElementById('entries-body').innerHTML = entries.map(e => {
    const onUrl = e.on_file_path ? sb.storage.from('kikkake-files').getPublicUrl(e.on_file_path).data.publicUrl : null
    const scriptUrl = e.script_file_path ? sb.storage.from('kikkake-files').getPublicUrl(e.script_file_path).data.publicUrl : null
    return `<tr>
      <td>${e.order ?? '<span class="muted">−</span>'}</td>
      <td style="font-weight:500;white-space:nowrap;">${e.combi_name}${e.is_updated ? '<span class="badge badge-updated">更新</span>' : ''}</td>
      <td>${e.format ? `<span class="badge badge-info">${e.format}</span>` : '<span class="muted">−</span>'}</td>
      <td>${e.tools || '<span class="muted">−</span>'}</td>
      <td>${e.itatsuki || '<span class="muted">−</span>'}</td>
      <td>${e.chuku_on === '有り' ? '<span class="badge badge-warn">有り</span>' : e.chuku_on === '無し' ? '<span class="badge badge-ok">無し</span>' : '<span class="muted">−</span>'}</td>
      <td>${e.chuku_hari === '有り' ? '<span class="badge badge-warn">有り</span>' : e.chuku_hari === '無し' ? '<span class="badge badge-ok">無し</span>' : '<span class="muted">−</span>'}</td>
      <td>${e.meiten_kikake || '<span class="muted">−</span>'}</td>
      <td>${e.anten_kikake || '<span class="muted">−</span>'}</td>
      <td colspan="3" style="padding:0;">
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <tr>
            <td style="padding:4px 8px;border-bottom:1px solid #f5f5f5;white-space:nowrap;">${e.debayashi_full || '<span class="muted">−</span>'}</td>
            <td style="padding:4px 8px;border-bottom:1px solid #f5f5f5;">${onUrl ? `<a href="${onUrl}" target="_blank" download style="color:#0d6efd;font-size:12px;">DL</a>` : '<span class="muted">−</span>'}</td>
            <td style="padding:4px 8px;border-bottom:1px solid #f5f5f5;">${scriptUrl ? `<a href="${scriptUrl}" target="_blank" download style="color:#0d6efd;font-size:12px;">DL</a>` : '<span class="muted">−</span>'}</td>
          </tr>
          <tr style="background:#fafafa;font-size:11px;color:#888;">
            <td style="padding:2px 8px;">出囃子</td>
            <td style="padding:2px 8px;">音源</td>
            <td style="padding:2px 8px;">台本</td>
          </tr>
        </table>
      </td>
      <td><button onclick="deleteEntry('${e.id}')" class="btn-sm btn-danger">削除</button></td>
    </tr>`
  }).join('')
}

async function loadStaff() {
  const { data: sl } = await sb.from('staff_lives')
    .select('user_id, profiles(display_name, email)')
    .eq('live_id', currentLiveId)
  const list = document.getElementById('staff-list')
  if (!sl || !sl.length) {
    list.innerHTML = '<p class="hint">参加スタッフがまだいません</p>'
    return
  }
  list.innerHTML = `
    <p class="hint" style="margin-bottom:12px;">参加スタッフ ${sl.length}名</p>
    ${sl.map(s => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;">
        <div style="width:32px;height:32px;border-radius:50%;background:#cfe2ff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#084298;flex-shrink:0;">
          ${(s.profiles?.display_name || s.profiles?.email || '?')[0].toUpperCase()}
        </div>
        <div>
          <p style="font-weight:500;font-size:14px;">${s.profiles?.display_name || '名前未設定'}</p>
          <p class="hint">${s.profiles?.email || ''}</p>
        </div>
      </div>
    `).join('')}
  `
}

async function deleteEntry(id) {
  if (!confirm('この提出データを削除しますか？')) return
  await sb.from('entries').delete().eq('id', id)
  loadEntries()
}

function closeDetail() {
  document.getElementById('detail-section').style.display = 'none'
  currentLiveId = null
}

if (sessionStorage.getItem('admin_authed') === '1') showAdmin()
</script>
</body>
</html>
